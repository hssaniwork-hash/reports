<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>نظام التقارير اليومية</title>

<!-- مكتبة PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

body{
    margin:0;
    padding:20px;
    font-family:Arial, sans-serif;
    font-size:14px;
    background:rgb(237,234,234);
    display:flex;
    flex-direction:column;
}

.hed{
    background:rgb(26,108,59);
    border-radius:13px;
    display:flex;
    flex-direction:column;
    font-size:16px;
    text-align:center;
    width:100%;
    justify-content:center;
    color:antiquewhite;
}

.continer{
    margin-top:1%;
    display:grid;
    grid-template-columns:1fr 1fr;
    text-align:center;
    background:#fff;
    border-radius:8px;
    width:99%;
    padding:5px;
    gap:20px;
}

.continer .card{
    background:#fff;
    border-radius:8px;
    width:100%;
    overflow:hidden;
    overflow-y:auto;
    display:flex;
    text-align:right;
    padding:5px;
    flex-direction:column;
}

.card h2{
    color:#0e7831;
    border-bottom:2px solid #5e4911;
}

.card label{
    color:#0e7831;
    margin-top:10px;
}


#range-val{
    position: relative;
    color: #0e7831;
    top: -50px;
    right: 360px;
}

.card input,
.card textarea{
    width:94%;
    border:solid 0.5px #111;
    border-radius:4px;
    padding:7px;
    margin-top:5px;
}

textarea{
    padding: 10px;
    line-height: 1.8;     
    font-size: 16px;
    resize: vertical;  
    direction: rtl;        
    white-space: pre-wrap; 
    overflow-wrap: break-word;
    overflow-y: visible;
    text-wrap: wrap;
}

.card textarea{
    text-wrap: wrap;
    height:max-content;
    display: flex;
    flex-direction: column;
    resize:horizontal;
     line-height: 1.8;     
    font-size: 16px; 
    direction: rtl;        
    white-space: pre-wrap; 
    overflow-wrap: break-word;
}

.card .box{
    display:grid;
    grid-template-columns:1fr;
}

.btn{
    margin-top:20px;
    border:none;
    padding:12px;
    border-radius:6px;
    background:#0e7831;
    color:#fff;
    cursor:pointer;
    font-size:16px;
    width:200px;
}

span{
    margin-top:10px;
}

.dashbord{
    display:grid;
    grid-template-columns:1fr 1fr;
    width:100%;
    gap:20px;
    background:#fff;
    border-radius:9px;
    margin-top:15px;
    padding:10px;
}

.dashbord .card{
    background:#0e7831;
    border-radius:8px;
    height:60px;
    border:solid 1.2px #5e4911;
    display:flex;
    color:#fff;
    justify-content:space-around;
    align-items:center;
    flex-direction:row;
}

.fotter{
    width:100%;
    text-align:center;
    margin-top:10px;
    background:#0e7831;
    color:#fffbe8;
    border-radius:4px;
    height: 120px;
    padding:10px;
}

/* تحسين الطباعة */

@media print{

    .btn{
        display:none;
    }

    body{
        background:#fff;
    }
 
textarea{
    resize: horizontal;
}

}

/* للجوال */

@media(max-width:768px){

    .continer{
        grid-template-columns:1fr;
        width: 100%;
        overflow: hidden;
        overflow-y: auto;
    }

    .dashbord{
        grid-template-columns:1fr;
    }

    .btn{
        width:100%;
    }

    #range-val{
    position: relative;
    color: #0e7831;
    top: -50px;
    right: 250px;
}
textarea{
    resize: horizontal;
}
}

</style>
</head>

<body>

<!-- المحتوى الذي سيتم تحويله PDF -->

<div id="con">

<div class="hed">
    <h1>نظام التقارير اليومية</h1>
    <h2>قسم المتابعة والتنفيذ</h2>
    <h2>قسم المتابعة-اللوجستية </h2>
</div>

<div class="continer">

    <!-- البطاقة الأولى -->

    <div class="card">

        <h2>المعلومات الأساسية</h2>

        <label>التاريخ</label>
        <input type="date">

        <label>اليوم</label>
        <input type="text">

        <label>اسم الموظف</label>
        <input type="text">

        <label>اسم القسم</label>
        <input type="text">

        <label>اسم المركز</label>
        <input type="text">

        <label>اسم المحافظة</label>
        <input type="text">

        <label>توقيت الدخول</label>
        <input type="time">

        <label>توقيت الخروج</label>
        <input type="time">

    </div>

    <!-- البطاقة الثانية -->

    <div class="card">

        <h2>التفاصيل والعمليات</h2>

        <div class="box">

            <label>المهام المنفذة</label>
            <textarea id="te" placeholder="اكتب المهام المنفذة اليوم بالتفصيل" style="height: max-content;"></textarea>

            <label>نسبة الإنجاز</label>
            <input type="range" id="range" min="0" max="100" step="10" onchange="val()"" value="0" placeholder="">
            <span id="range-val">0%</span>
            <label>المشاكل والمعوقات</label>
            <textarea id="te" style="height: max-contentt;"></textarea>

            <label >الاحتياجات المطلوبة</label>
            <textarea id="te" style="height: max-content;"></textarea>

            <label>خطة عمل اليوم التالي</label>
            <textarea id="te" style="height: fit-content;"></textarea>

        </div>

    </div>

</div>

<span>يرجى تعبئة البيانات بحذر قبل إرسال التقرير</span>

<!-- لوحة الإحصائيات -->

<div class="dashbord">

    <div class="card">
        <span>عدد المهام الكلي</span>
        <span>20</span>
    </div>

    <div class="card">
        <span>عدد المهام المكتملة</span>
        <span>20</span>
    </div>

    <div class="card">
        <span>عدد المهام العالقة</span>
        <span>20</span>
    </div>

    <div class="card">
        <span>عدد المشكلات</span>
        <span>20</span>
    </div>

</div>
-->
<!-- الفوتر -->

<div class="fotter">

    <span>وزارة الداخلية السورية</span>

    <br><br>

    <span>
        إدارة القوى البشرية -  المتابعة اليومية واللوجستية
    </span>

 <h4>Power by:Fawaz-Alhassani</h4>


</div>

</div>

<!-- زر التحميل -->

<button class="btn" onclick="downloadPDF()">
تحميل التقرير PDF
</button>

<script>

let vc = document.getElementById('range');
let ran = document.getElementById('range-val');
function val(){
ran.innerHTML = vc.value + '%';
}
const de = new Date();

function downloadPDF() {

    const element = document.getElementById('con');

    const opt = {
        margin: [10,10,10,10],

        filename:'التقرير اليومي'+ '' + de.toLocaleString() + '.pdf',

        image: {
            type: 'jpeg',
            quality: 1
        },

        html2canvas: {
            scale: 2,
            scrollY: 0,
            useCORS: true
        },

        jsPDF: {
            unit: 'mm',
            format: 'a4',
            orientation: 'portrait'
        },

        pagebreak: {
            mode: ['css', 'legacy']
        }
    };

    html2pdf()
        .from(element)
        .set(opt)
        .save();
}
</script>

</body>
</html>
